steps:
  # Build Web Image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-web"
    waitFor: ["-"]
    args:
      - "build"
      - "-t"
      - "${_WEB_IMAGE_URI}"
      - "--build-arg"
      - "BUILD_TARGET=web"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_NAME=${_NEXT_PUBLIC_APP_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_DESCRIPTION=${_NEXT_PUBLIC_APP_DESCRIPTION}"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${_NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_DEFAULT_NETWORK=${_NEXT_PUBLIC_DEFAULT_NETWORK}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CHAIN_ID=${_NEXT_PUBLIC_HYPERLIQUID_CHAIN_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CHAIN_NAME=${_NEXT_PUBLIC_HYPERLIQUID_CHAIN_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_RPC_URL=${_NEXT_PUBLIC_HYPERLIQUID_RPC_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_EXPLORER_URL=${_NEXT_PUBLIC_HYPERLIQUID_EXPLORER_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CURRENCY_NAME=${_NEXT_PUBLIC_HYPERLIQUID_CURRENCY_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CURRENCY_SYMBOL=${_NEXT_PUBLIC_HYPERLIQUID_CURRENCY_SYMBOL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CURRENCY_DECIMALS=${_NEXT_PUBLIC_HYPERLIQUID_CURRENCY_DECIMALS}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_ID=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_NAME=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_RPC_URL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_RPC_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_EXPLORER_URL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_EXPLORER_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_NAME=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_SYMBOL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_SYMBOL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_DECIMALS=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_DECIMALS}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_FAUCET_URL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_FAUCET_URL}"
      - "."

  # Build WS Image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-ws"
    waitFor: ["-"]
    args:
      - "build"
      - "-t"
      - "${_WS_IMAGE_URI}"
      - "--build-arg"
      - "BUILD_TARGET=ws-server"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_NAME=${_NEXT_PUBLIC_APP_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_DESCRIPTION=${_NEXT_PUBLIC_APP_DESCRIPTION}"
      - "--build-arg"
      - "NEXT_PUBLIC_APP_URL=${_NEXT_PUBLIC_APP_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_WS_URL=${_NEXT_PUBLIC_WS_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${_NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_DEFAULT_NETWORK=${_NEXT_PUBLIC_DEFAULT_NETWORK}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CHAIN_ID=${_NEXT_PUBLIC_HYPERLIQUID_CHAIN_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CHAIN_NAME=${_NEXT_PUBLIC_HYPERLIQUID_CHAIN_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_RPC_URL=${_NEXT_PUBLIC_HYPERLIQUID_RPC_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_EXPLORER_URL=${_NEXT_PUBLIC_HYPERLIQUID_EXPLORER_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CURRENCY_NAME=${_NEXT_PUBLIC_HYPERLIQUID_CURRENCY_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CURRENCY_SYMBOL=${_NEXT_PUBLIC_HYPERLIQUID_CURRENCY_SYMBOL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_CURRENCY_DECIMALS=${_NEXT_PUBLIC_HYPERLIQUID_CURRENCY_DECIMALS}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_ID=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_NAME=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CHAIN_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_RPC_URL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_RPC_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_EXPLORER_URL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_EXPLORER_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_NAME=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_NAME}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_SYMBOL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_SYMBOL}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_DECIMALS=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_CURRENCY_DECIMALS}"
      - "--build-arg"
      - "NEXT_PUBLIC_HYPERLIQUID_TESTNET_FAUCET_URL=${_NEXT_PUBLIC_HYPERLIQUID_TESTNET_FAUCET_URL}"
      - "."

images:
  - "${_WEB_IMAGE_URI}"
  - "${_WS_IMAGE_URI}"
