[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
hyperliquid = "${HYPERLIQUID_RPC_URL}"

[etherscan]
hyperliquid = { key = "${HYPERLIQUID_EXPLORER_API_KEY}" }

[fmt]
line_length = 120
multiline_func_header = "all"

[profile.ci]
deny_warnings = true
